.cursor {
    animation:blink 1s infinite;
}

@keyframes blink {
    50% {opacity:0;}
}

.glitch {
    animation:glitch .15s infinite;
}

@keyframes glitch {
    0% {transform:translateX(0);}
    50% {transform:translateX(2px);}
    100% {transform:translateX(-2px);}
